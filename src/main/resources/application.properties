spring.application.name=championat

# Server configuration
server.port=8089
server.servlet.context-path=/championnat

### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:3306/championnat_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

### JPA / HIBERNATE ###
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging configuration
logging.file.name=spring_log_file.log
logging.file.max-size=100KB
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level - %logger{36} - %msg%n

# ============================================================
# SpringDoc / Swagger UI Configuration
# UI : http://localhost:8089/championnat/swagger-ui/index.html
# JSON: http://localhost:8089/championnat/v3/api-docs
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
